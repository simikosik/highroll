<h3>Stats</h3>

<p>Wins: {{ stats.wins() }}</p>
<p>Losses: {{ stats.losses() }}</p>
<p>Win rate: {{ stats.getWinRate() }}%</p>

    Chasing losses is risky.
  </p>
}
